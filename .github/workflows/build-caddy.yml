name: build-caddy-cloudflare

on:
  workflow_dispatch:
    inputs:
      caddy_version:
        description: "Optional: specific Caddy version (e.g. 2.8.4). Leave empty to auto-detect latest stable."
        required: false
        default: ""
      force_build:
        description: "Build even if the target version already exists in GHCR"
        required: false
        type: boolean
        default: false
  schedule:
    # Every week: Monday 03:00 UTC
    - cron: "0 3 * * 1"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/caddy-cloudflare

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      caddy_version: ${{ steps.resolve.outputs.caddy_version }}
      should_build: ${{ steps.resolve.outputs.should_build }}
      reason: ${{ steps.resolve.outputs.reason }}

    steps:
      - name: Login to GHCR (for tag existence check)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target Caddy version and decide build
        id: resolve
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.caddy_version }}
          FORCE_BUILD: ${{ github.event.inputs.force_build }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail

          get_latest_caddy_version() {
            curl -fsSL "https://registry.hub.docker.com/v2/repositories/library/caddy/tags?page_size=100" \
              | python3 -c 'import json,sys,re; data=json.load(sys.stdin); tags=[r.get("name","") for r in data.get("results", []) if re.fullmatch(r"\d+\.\d+\.\d+", r.get("name",""))]; tags.sort(key=lambda s: tuple(int(x) for x in s.split("."))); print(tags[-1] if tags else "")'
          }

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION}"
            SOURCE="manual-input"
          else
            VERSION="$(get_latest_caddy_version)"
            SOURCE="dockerhub-latest"
          fi

          if [ -z "$VERSION" ]; then
            echo "Failed to resolve target Caddy version." >&2
            exit 1
          fi

          SHOULD_BUILD="true"
          REASON="new-version"

          if [ "${FORCE_BUILD:-false}" = "true" ]; then
            REASON="force-build"
          else
            if docker manifest inspect "${IMAGE_NAME}:${VERSION}" >/dev/null 2>&1; then
              SHOULD_BUILD="false"
              REASON="already-built"
            fi
          fi

          echo "caddy_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          echo "Target version: $VERSION"
          echo "Decision: should_build=$SHOULD_BUILD (reason=$REASON, source=$SOURCE)"

  build:
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_build == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.resolve.outputs.caddy_version }}
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/caddy.Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CADDY_VERSION=${{ needs.resolve.outputs.caddy_version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  skip:
    runs-on: ubuntu-latest
    needs: resolve
    if: needs.resolve.outputs.should_build != 'true'

    steps:
      - name: Skip build
        run: |
          echo "No new Caddy version to build."
          echo "Target version: ${{ needs.resolve.outputs.caddy_version }}"
          echo "Reason: ${{ needs.resolve.outputs.reason }}"
