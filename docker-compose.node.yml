x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:latest
    container_name: 3x-ui
    restart: unless-stopped
    ports:
      - "443:443/tcp"
      - "443:443/udp"
      - "20000-20100:20000-20100/tcp"
      - "20000-20100:20000-20100/udp"
    volumes:
      - ./3x-ui/db:/etc/x-ui
      - ./3x-ui/config:/etc/xray
      # Expose Caddy-managed TLS certificates to 3x-ui (for example, Hysteria2).
      - ./caddy/data:/caddy-data:ro
    environment:
      TZ: ${TZ}
      XRAY_VMESS_AEAD_FORCED: "false"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    networks:
      - edge-net
      - app-net
    logging: *default-logging

  caddy:
    image: ghcr.io/qinyuhang/caddy-cloudflare:latest
    container_name: caddy
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      NODE_1_DOMAIN: ${NODE_1_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN}
    ports:
      - "${CADDY_HTTPS_PORT:-8443}:8443/tcp"
    volumes:
      - ./caddy/Caddyfile.node:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
      - /srv/blog:/srv/blog:ro
    depends_on:
      - 3x-ui
    security_opt:
      - no-new-privileges:true
    networks:
      edge-net:
      app-net:
        aliases:
          - caddy.internal
    logging: *default-logging

networks:
  edge-net:
    driver: bridge
  app-net:
    driver: bridge
    internal: true
